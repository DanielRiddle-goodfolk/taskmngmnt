<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-logo">⚡</span>
        <span class="header-title">Task Hub</span>
      </div>
      <div class="header-meta">
        <span class="live-dot" id="live-dot" title="Live polling active"></span>
        <span id="last-updated" class="last-updated">Connecting…</span>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <!-- New Task Panel -->
      <div class="card" id="form-card">
        <div class="card-header">
          <h2 class="card-title">New Task</h2>
          <button id="form-toggle" class="btn-outline" aria-expanded="false">+ Add Task</button>
        </div>

        <div id="form-panel" class="form-panel collapsed" aria-hidden="true">
          <form id="task-form" novalidate>
            <div class="form-row">
              <div class="form-group form-group--full">
                <label for="task-name">Task Name <span class="required">*</span></label>
                <input
                  type="text"
                  id="task-name"
                  placeholder="What needs to be done?"
                  autocomplete="off"
                  required
                />
              </div>
            </div>

            <div class="form-row form-row--three">
              <div class="form-group">
                <label for="entity-select">Entity</label>
                <select id="entity-select">
                  <option value="">— None —</option>
                </select>
              </div>
              <div class="form-group">
                <label for="person-select">Assign To</label>
                <select id="person-select">
                  <option value="">— Unassigned —</option>
                </select>
              </div>
              <div class="form-group">
                <label for="due-date">Due Date</label>
                <input type="date" id="due-date" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group form-group--full">
                <label for="notes">Notes</label>
                <textarea id="notes" placeholder="Any context or details…" rows="2"></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" id="form-cancel" class="btn-ghost">Cancel</button>
              <button type="submit" id="submit-btn" class="btn-primary">
                <span class="btn-label">Add Task</span>
                <span class="btn-spinner hidden">●</span>
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="filters-left">
          <div class="filter-group">
            <label class="filter-label" for="filter-person">Person</label>
            <select id="filter-person" class="filter-select">
              <option value="">All People</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label" for="filter-entity">Entity</label>
            <select id="filter-entity" class="filter-select">
              <option value="">All Entities</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label" for="filter-status">Status</label>
            <select id="filter-status" class="filter-select">
              <option value="">All Statuses</option>
              <option value="Not started">Not Started</option>
              <option value="In progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <button id="clear-filters" class="btn-ghost btn-sm hidden">✕ Clear</button>
        </div>
        <div class="filters-right">
          <span class="task-counter"><span id="task-count">—</span> tasks</span>
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list">
        <div class="skeleton-list">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
