<div id="filter-strip" class="filter-strip"></div>

<div class="main" id="main">
  <div id="task-list" class="task-list"></div>
</div>

<div id="filter-picker" class="filter-picker">
  <span class="picker-title" id="picker-title">Filter by Person</span>
  <div class="picker-options" id="picker-options"></div>
</div>

<div class="bottom-bar">
  <div class="bar-filters">
    <button class="bar-btn" id="btn-people">
      <svg class="bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="bar-label">People</span>
      <span class="bar-dot"></span>
    </button>
    <button class="bar-btn" id="btn-business">
      <svg class="bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
      </svg>
      <span class="bar-label">Business</span>
      <span class="bar-dot"></span>
    </button>
  </div>
  <button class="fab" id="fab">
    <span class="fab-plus">+</span>
  </button>
</div>

<div class="sheet" id="task-sheet">
  <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
  <div class="sheet-scroll">
    <h2 class="sheet-title">New Task</h2>
    <form id="task-form" novalidate>
      <div class="field">
        <label>Task Name *</label>
        <input type="text" id="f-name" placeholder="What needs to be done?" autocomplete="off" required/>
      </div>
      <div class="field">
        <label>Business</label>
        <select id="f-biz"><option value="">None</option></select>
      </div>
      <div class="field">
        <label>Assign To</label>
        <div id="f-person-wrap" style="display:flex;gap:.35rem;flex-wrap:wrap;min-height:48px;align-items:center;padding:.1rem 0"></div>
      </div>
      <div class="field">
        <label>Due Date</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Any context or details…" rows="3"></textarea>
      </div>
      <button type="submit" class="btn-save apple" id="f-submit">Add Task</button>
    </form>
  </div>
</div>

<div class="sheet" id="detail-sheet">
  <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
  <div class="sheet-scroll" id="detail-content"></div>
</div>

<div class="backdrop" id="backdrop"></div>
